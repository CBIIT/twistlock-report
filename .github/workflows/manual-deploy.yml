name: General Commons (CDS)  Manual Deployment
permissions: 
  contents: write
  id-token: write
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Dev environment'
        required: true
        default: dev
        type: choice
        options:
          - dev
          - dev2
      #crdc_hub_branch:
        #description: 'Which Branch of the crdc-datahub code to use'
        #required: true
        #default: 'main'
        #type: text
      frontend_image:
      backend_image:
      interoperation_image:
      memgraph_image:
      cdk_command:
        description: 'Which CDK Command To Run'
        required: true
        default: 'deploy'
        type: choice
        options:
          - diff
          - synth
          - deploy
          - destroy
run-name: ${{ github.event_name == 'workflow_dispatch' && format('CDK_Run-{0}-branch-{1}', tojson(inputs), github.ref_name) || '' }}
jobs:
  build:
    name: Deploy General Commons
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
    - name: Check out code
      uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5     # v2.7.0

    - name: Set up Python 3.9
      uses: actions/setup-python@b64ffcaf5b410884ad320a9cfac8866006a109aa     # v4.8.0
      with:
        python-version: "3.9"

    - name: Set up Node
      uses: actions/setup-node@1a4442cacd436585916779262731d5b162bc6ec7     # v3.8.2
      with:
        node-version: "20"
 
    - name: Install Python dependencies and CDK
      run: |
        python -m pip install --upgrade pip
        # install stack Python dependencies
        cd awscdk/gc && pip3 install --ignore-installed --break-system-packages -r requirements.txt
        npm install -g aws-cdk@2.155.0

    - name: AWS OIDC Authentication
      id: aws-auth
      uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502     # v4.0.2
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: ${{ secrets.AWS_REGION }}
        role-session-name: ${{ github.actor }}
    
    - name: Get config files
      id: get-config
      env:
        ENV_NAME: ${{ inputs.environment }}
        BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        FRONTEND_IMAGE: ${{ inputs.frontend_image }}
        BACKEND_IMAGE: ${{ inputs.backend_image }}
        INTEROPERATION_IMAGE: ${{ inputs.interoperation_image }}
        MEMGRAPH_IMAGE: ${{ inputs.memgraph_image }}
        BUCKET_NAME: ${{ secrets.CDK_BUCKET }}
      run: |
        if [[ "$ENV_NAME" =~ ^(dev|dev2|qa|qa2|stage|prod)$ ]]; then
          echo "Environment is $ENV_NAME"
        else
          BRANCH_NAME=$(echo $BRANCH_NAME | tr '_' '-')
          echo "Environment is $ENV_NAME"
          echo "Updated branch name is $BRANCH_NAME"
        fi

        vars=$(python3 awscdk/scripts/readYML.py awscdk/versions.yaml)
        for v in $vars; do command="export $v"; eval $command;  done

        FRONTEND_IMAGE="${FRONTEND_IMAGE:-$IMAGE_FRONTEND}"
        echo "FRONTEND_IMAGE=$FRONTEND_IMAGE" >> $GITHUB_ENV
        BACKEND_IMAGE="${BACKEND_IMAGE:-$IMAGE_BACKEND}"
        echo "BACKEND_IMAGE=$BACKEND_IMAGE" >> $GITHUB_ENV
        INTEROPERATION_IMAGE="${INTEROPERATION_IMAGE:-$IMAGE_INTEROPERATION}"
        echo "INTEROPERATION_IMAGE=$INTEROPERATION_IMAGE" >> $GITHUB_ENV
        MEMGRAPH_IMAGE="${MEMGRAPH_IMAGE:-$IMAGE_MEMGRAPH}"
        echo "MEMGRAPH_IMAGE=$MEMGRAPH_IMAGE" >> $GITHUB_ENV

        cd awscdk/gc/
        #aws s3api get-object --bucket bento-mdb-cdk --key config/config.ini.$ENV_NAME ./config.ini.$ENV_NAME
        aws s3api get-object --bucket $BUCKET_NAME --key config/config.ini.$ENV_NAME ./config.ini.$ENV_NAME
        
        envsubst < config.ini.$ENV_NAME > config.ini

    - name: Execute CDK
      id: execute-cdk
      env:
        AWS_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT }}
        AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        ENV_NAME: ${{ inputs.environment }}
        CDK_CMD: ${{ inputs.cdk_command }}
      run: |

        cd awscdk/gc && cdk $CDK_CMD --require-approval=never --force

    - name: Update versions file
      env:
        CDK_CMD: ${{ inputs.cdk_command }}
        ENV_NAME: ${{ inputs.environment }}
        #BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      run: |
        if [[ "${CDK_CMD}" == "deploy" && ( "${ENV_NAME}" == "dev" || "${ENV_NAME}" == "dev2" ) ]]; then
          echo "Updating versions.yaml file"
          python3 awscdk/scripts/writeYML.py awscdk/versions.yaml
        else
          echo "Skipping versions.yaml file update"
        fi

        git config --local user.name actions-user
        git config --local user.email "actions@github.com"
        if ! git diff --exit-code; then
            git add awscdk/versions.yaml
            git commit -am "GH Action - Versions File updated $(date)"
            git push -f origin ${{ github.head_ref || github.ref_name }}
            #git push -f origin "${BRANCH_NAME}"
        fi
  
    - name: Slack Notification
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      uses: act10ns/slack@87c73aef9f8838eb6feae81589a6b1487a4a9e08     # v1.6.0
      with:
        status: ${{ job.status }}
        steps: ${{ toJson(steps) }}
      if: always()
